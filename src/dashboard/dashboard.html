<section class="ddh-panel">
  <header class="ddh-header">
    <div>
      <strong>Deliveroo Data Hub</strong>
      <span class="ddh-status" data-ddh-status>Idle</span>
    </div>

    <button class="ddh-close" type="button" data-ddh-close>×</button>
  </header>

  <main class="ddh-body">
    <label>
      Date de début
      <input type="date" class="ddh-input" data-ddh-start-date />
    </label>

    <label>
      Date de fin
      <input type="date" class="ddh-input" data-ddh-end-date />
    </label>

    <div class="ddh-actions">
      <button type="button" data-ddh-start>Start</button>
      <button type="button" data-ddh-pause>Pause</button>
      <button type="button" data-ddh-resume>Resume</button>
      <button type="button" data-ddh-stop>Stop</button>
      <button type="button" data-ddh-reset>Reset</button>
      <button type="button" data-ddh-export>Export JSON</button>
    </div>

    <div class="ddh-stats">
      <div>Commandes collectées : <strong data-ddh-collected-count>0</strong></div>
      <div>Commandes retenues : <strong data-ddh-retained-count>0</strong></div>
      <div>Total dépensé : <strong data-ddh-total-spent>0 €</strong></div>
      <div>Réponses capturées : <strong data-ddh-responses-captured>0</strong></div>
      <div>Clics voir plus : <strong data-ddh-view-more-clicks>0</strong></div>
      <div>Plus récente : <strong data-ddh-newest-date>N/A</strong></div>
      <div>Plus ancienne : <strong data-ddh-oldest-date>N/A</strong></div>
      <div class="ddh-error" data-ddh-error hidden></div>
    </div>
  </main>
</section>

<section class="ddh-logs">
  <strong>Logs</strong>
  <div class="ddh-log-list" data-ddh-logs></div>
</section>
